  if(map){
    f.forEach(p=>{
      const c=COLORS[p.day]||"#888";
      const mk=L.marker([p.lat,p.lng],{icon:L.divIcon({
        html:`<div style="background:${c};width:18px;height:18px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.5);"></div>`,
        className:'',iconSize:[18,18]})}).addTo(map).bindPopup(
        `<b>${p.name}</b><br>${p.area}<br>📅 ${p.day} · 🏪 ${p.stalls} 攤 · ${p.council}<br>📏 距你約 ${dist(p.lat,p.lng)} km`+
        `<div class="pop-btns"><a style="background:#1A73E8" href="${p.gmaps}" target="_blank">Google</a>`+
        `<a style="background:#33CCFF;color:#0E0F12" href="${p.waze}" target="_blank">Waze</a></div>`
      );
      markers.push(mk);
    });
    if(f.length){try{map.fitBounds(L.featureGroup(markers).getBounds().pad(.2));}catch(e){}}
  }
  renderList(f);
}

function renderList(f){
  f=f||PASAR.filter(p=>currentDay==="全部"||p.day===currentDay);
  const sorted=[...f].sort((a,b)=>dist(a.lat,a.lng)-dist(b.lat,b.lng));
  document.getElementById('list').innerHTML=sorted.map(p=>{
    const c=COLORS[p.day]||"#888";
    return `<div class="card" style="border-left-color:${c}">
      <div class="row">
        <div class="info">
          <div class="name">${p.name}</div>
          <div class="area">📍 ${p.area}</div>
          <div class="meta"><span class="badge" style="background:${c}">${p.day}</span>🏪 ${p.stalls} 攤 · ${p.council} · <span class="dist">${dist(p.lat,p.lng)} km</span></div>
        </div>
        <div class="qr"><img src="data:image/png;base64,${p.qr}"><span>掃碼導航</span></div>
      </div>
      <div class="navbtns">
        <a class="navbtn b-g" href="${p.gmaps}" target="_blank">🧭 Google 導航</a>
        <a class="navbtn b-w" href="${p.waze}" target="_blank">🚗 Waze 導航</a>
      </div>
    </div>`;
  }).join('');
}

function buildTabs(){
  const t=document.getElementById('tabs');t.innerHTML='';
  DAYS.forEach(d=>{
    const b=document.createElement('button');
    b.className='tab'+(d===currentDay?' active':'');
    b.textContent=d;
    b.style.background=d==="全部"?"#E11D2E":(COLORS[d]||"#444");
    b.onclick=()=>{currentDay=d;
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');render();};
    t.appendChild(b);
  });
}

if(document.readyState!=="loading") init();
else document.addEventListener('DOMContentLoaded',init);
</script>
<script>(function(){
var KEY="pasar";
var CTRL="https://raw.githubusercontent.com/HEX-qqdq/HEX/main/control.json";
var g=document.getElementById('hexgate');
var T=document.getElementById('hg-title'),S=document.getElementById('hg-sub'),SP=document.getElementById('hg-spin'),R=document.getElementById('hg-retry');
function loading(){T.textContent='檢查中…';S.textContent='正在確認開放狀態';SP.style.display='block';R.style.display='none';}
function closed(t,s,retry){T.textContent=t;S.textContent=s;SP.style.display='none';R.style.display=retry?'inline-block':'none';}
function reveal(){g.style.display='none';}
function check(){
  loading();
  fetch(CTRL+'?t='+Date.now(),{cache:'no-store'})
  .then(function(r){if(!r.ok)throw 0;return r.json();})
  .then(function(d){
    var e=d[KEY]||{};var ok=e.open===true;
    if(ok&&e.until){var dl=Date.parse(e.until+'T23:59:59+08:00');if(!isNaN(dl)&&Date.now()>dl)ok=false;}
    if(ok)reveal();else closed('本頁面目前未開放','如需查看請聯繫 YIHANG 逸航',false);
  })
  .catch(function(){closed('暫時無法載入','請稍後再試',true);});
}
R.addEventListener('click',check);
check();
})();</script>
</body>
