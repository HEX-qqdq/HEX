#map{height:46vh;min-height:300px;width:100%}

.badge{flex:0 0 auto;font-size:10.5px;font-weight:800;color:#fff;border-radius:4px;padding:3px 7px;letter-spacing:.5px}

.meta .star{color:var(--gold);font-weight:700}
.acts{display:flex;border-top:1px solid #eceae4}
.acts a{flex:1;text-align:center;padding:9px 4px;font-size:12.5px;font-weight:700;text-decoration:none;color:var(--navy)}
.acts a+a{border-left:1px solid #eceae4}

.acts a.waz{color:#0A6ED1}
.acts a.dim{color:#9ca3af;pointer-events:none}
footer{padding:14px;text-align:center;font-size:10.5px;color:#8a8577;line-height:1.6}
.leaflet-popup-content{font-size:12.5px;line-height:1.5;min-width:190px}

// 地圖
const map=L.map('map',{scrollWheelZoom:false}).setView([-6.35,107.4],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);

function gm(s){return 'https://www.google.com/maps/search/?api=1&query='+s.lat+','+s.lng+'&query_place_id='+s.pid;}
function wz(s){return 'https://waze.com/ul?ll='+s.lat+','+s.lng+'&navigate=yes';}
function waL(s){return s.wa?'https://wa.me/'+s.wa:null;}

function pin(color,star){
 return L.divIcon({className:'',html:'<div style="width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:'+color+';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);color:#fff;font-size:12px;font-weight:900">'+(star?'★':'')+'</span></div>',iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-24]});
}

const markers=[];
S.forEach((s,i)=>{
 const m=L.marker([s.lat,s.lng],{icon:pin(T[s.t].c,s.star)});
 const acts='<div class="pop-acts">'+
   (waL(s)?'<a class="pa-wa" href="'+waL(s)+'" target="_blank">WA</a>':'')+
   '<a class="pa-gm" href="'+gm(s)+'" target="_blank">GMaps</a>'+
   '<a class="pa-wz" href="'+wz(s)+'" target="_blank">Waze</a></div>';
 m.bindPopup('<b>'+(s.star?'★ ':'')+s.n+'</b><br><span style="color:'+T[s.t].c+';font-weight:700;font-size:11px">'+T[s.t].n+'｜'+s.city+'</span><br>'+s.waTxt+'<br><span style="color:#c2912f">★ '+s.r+'</span>'+acts);
 m.addTo(map); m._tier=s.t; m._star=s.star; markers.push(m);
});

// 卡片
const list=document.getElementById('list');
function card(s){
 const waBtn = waL(s)
   ? '<a class="wa" href="'+waL(s)+'" target="_blank">💬 WhatsApp</a>'
   : '<a class="dim">WA 待查</a>';
 return '<div class="card" data-t="'+s.t+'" data-s="'+s.star+'" style="border-left-color:'+T[s.t].c+'">'
  +'<div class="top"><h3>'+(s.star?'★ ':'')+s.n+'<small>'+s.city+'｜'+s.a+'</small></h3>'
  +'<span class="badge" style="background:'+T[s.t].c+'">'+T[s.t].n+'</span></div>'
  +'<div class="meta"><span class="star">★ '+s.r+'</span>｜'+s.waTxt+'<br>'+s.note+'</div>'
  +'<div class="acts">'+waBtn
  +'<a href="'+gm(s)+'" target="_blank">🗺️ Google Maps</a>'
  +'<a class="waz" href="'+wz(s)+'" target="_blank">🧭 Waze</a></div></div>';
}
function render(f){
 let arr=S.map((s,i)=>({s,i}));
 if(f==='star') arr=arr.filter(x=>x.s.star);
 else if(f!=='all') arr=arr.filter(x=>x.s.t===f);
 list.innerHTML=arr.map(x=>card(x.s)).join('');
 markers.forEach((m,i)=>{
   const show = f==='all' || (f==='star'?m._star:m._tier===f);
   show?m.addTo(map):map.removeLayer(m);
 });
 const vis=arr.map(x=>[x.s.lat,x.s.lng]);
 if(vis.length) map.fitBounds(vis,{padding:[30,30],maxZoom:12});
}
document.getElementById('cAll').textContent='('+S.length+')';
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
 b.classList.add('on'); render(b.dataset.f);
});
render('all');
</script>
