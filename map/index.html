const COLORS={red:"#E11D2E",amber:"#E8A12C",blue:"#3B82F6",grey:"#7A8089"};
function mytNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kuala_Lumpur'}));}
function openState(s){const d=mytNow();const h=s.hours[d.getDay()];const m=d.getHours()*60+d.getMinutes();
  return (h&&m>=h[0]&&m<h[1])?{open:true,txt:"營業中"}:{open:false,txt:"未營業"};}
function gUrl(s){return `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&destination_place_id=${s.pid}`;}
function wUrl(s){return `https://waze.com/ul?ll=${s.lat},${s.lng}&navigate=yes`;}
const GICON='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/></svg>';
const WICON='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 0 0-9 9c0 2 .7 3.4 1 4.2.3.8-.2 2-.6 2.7-.2.4.1.9.6.8 1.2-.2 2.6-.6 3.3-1.1A9 9 0 1 0 12 3zm-3 8a1.2 1.2 0 1 1 0-2.4A1.2 1.2 0 0 1 9 11zm6 0a1.2 1.2 0 1 1 0-2.4A1.2 1.2 0 0 1 15 11zm-3 5.2c-2 0-3.5-1.3-3.8-3h7.6c-.3 1.7-1.8 3-3.8 3z"/></svg>';
const CICON='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8a15 15 0 0 0 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.4.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1A17 17 0 0 1 3 4c0-.6.4-1 1-1h3.4c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.4 0 .8-.3 1l-2.1 2.2z"/></svg>';

const map=L.map('map',{zoomControl:true,scrollWheelZoom:false}).setView([4.2,101.2],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
const layer=L.layerGroup().addTo(map);
const markers={};
const list=document.getElementById('list');
let currentR="all";

function visible(){return SHOPS.filter(s=>currentR==="all"||s.region===currentR);}

function render(){
  layer.clearLayers(); list.innerHTML=""; for(const k in markers) delete markers[k];
  const shops=visible();
  // markers
  shops.forEach(s=>{
    const html=`<div class="mk"><svg width="30" height="42" viewBox="0 0 30 42"><path d="M15 0C6.7 0 0 6.7 0 15c0 10 15 27 15 27s15-17 15-27C30 6.7 23.3 0 15 0z" fill="${COLORS[s.color]}"/></svg><span>${s.num}</span></div>`;
    const icon=L.divIcon({html,className:'',iconSize:[30,42],iconAnchor:[15,42],popupAnchor:[0,-38]});
    const m=L.marker([s.lat,s.lng],{icon}).addTo(layer);
    m.bindPopup(`<div class="pop-name">${s.num}. ${s.n}</div><div class="pop-role">${s.role}</div>
      <div class="pop-addr">${s.addr}<br>${s.hoursTxt}</div>
      <div class="pop-btns">
        <a class="btn btn-g" target="_blank" rel="noopener" href="${gUrl(s)}">${GICON}Google</a>
        <a class="btn btn-w" target="_blank" rel="noopener" href="${wUrl(s)}">${WICON}Waze</a></div>`);
    markers[s.id]=m;
  });
  // fit
  if(shops.length){map.fitBounds(shops.map(s=>[s.lat,s.lng]),{padding:[40,40],maxZoom:13});}
  // list grouped by region
  let last="";
  shops.forEach(s=>{
    const grp=s.region==="central"?"中馬 · 吉隆坡／雪蘭莪／怡保":"北馬 · 檳城／吉打";
    if(grp!==last){const gl=document.createElement('div');gl.className='group-label';gl.textContent=grp;list.appendChild(gl);last=grp;}
    const st=openState(s);
    const c=document.createElement('div');c.className='card';c.id='card-'+s.id;
    c.innerHTML=`<div class="card-top">
        <div class="pin" style="background:${COLORS[s.color]}">${s.num}</div>
        <div><div class="name">${s.n}</div><div class="role">${s.role}</div></div>
        <div class="meta"><span class="pill ${st.open?'open':'closed'}">${st.txt}</span></div></div>
      <div class="stars">${'★'.repeat(Math.round(s.rating))}<span class="rating">${s.rating.toFixed(1)} · ${s.rc} 則</span></div>
      <div class="info"><b>📍</b> ${s.addr}<br><b>🕒</b> ${s.hoursTxt}<br><b>🔧</b> ${s.prod}</div>
      <div class="fit ${s.color}">${s.fit}</div>
      <div class="btns">
        <a class="btn btn-g" target="_blank" rel="noopener" href="${gUrl(s)}">${GICON}Google 導航</a>
        <a class="btn btn-w" target="_blank" rel="noopener" href="${wUrl(s)}">${WICON}Waze 導航</a>
        <a class="btn btn-c" href="tel:${s.tel}">${CICON}撥電話</a></div>`;
    c.addEventListener('click',e=>{
      if(e.target.closest('a'))return;
      document.querySelectorAll('.card').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      map.setView([s.lat,s.lng],15,{animate:true});
      markers[s.id].openPopup();
      document.getElementById('map').scrollIntoView({behavior:'smooth',block:'start'});
    });
    list.appendChild(c);
  });
}
document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); currentR=b.dataset.r; render();
}));
render();
</script>
</body>
</html>
