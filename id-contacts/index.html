*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--paper);color:var(--ink);padding-bottom:40px}
header{background:var(--navy);color:#fff;padding:12px 14px}

.tabs{display:flex;gap:6px;overflow-x:auto;padding:9px 12px;background:#fff;border-bottom:2px solid var(--navy);position:sticky;top:0;z-index:10}
.tab{flex:0 0 auto;border:1.5px solid var(--navy);color:var(--navy);background:#fff;border-radius:18px;padding:5px 13px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap}
.tab.on{background:var(--navy);color:#fff}
.tab .d{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.list{max-width:820px;margin:0 auto;padding:12px;display:grid;gap:10px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(16,24,32,.12);overflow:hidden;border-left:6px solid var(--navy)}
.top{padding:10px 12px 4px;display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.top h3{font-size:15px}.top h3 small{display:block;font-size:11px;color:#6b7280;font-weight:400;margin-top:2px}
.badge{flex:0 0 auto;font-size:10px;font-weight:800;color:#fff;border-radius:4px;padding:3px 8px}
.meta{padding:2px 12px 8px;font-size:12px;color:#374151;line-height:1.6}
.meta .addr{color:#111}.meta .note{color:#8A6A2A;font-size:11.5px;margin-top:2px}
.acts{display:flex;border-top:1px solid #eee;flex-wrap:wrap}
.acts a{flex:1;min-width:25%;text-align:center;padding:9px 4px;font-size:12px;font-weight:700;text-decoration:none;border-right:1px solid #eee}
.acts a:last-child{border-right:0}
.a-wa{color:#128C4A}.a-tel{color:#333}.a-gm{color:var(--gm)}.a-wz{color:var(--wz)}
.a-off{color:#bbb;pointer-events:none}
footer{text-align:center;font-size:10.5px;color:#8a8577;padding:14px;line-height:1.6}

function gm(s){return s.pid?('https://www.google.com/maps/search/?api=1&query='+s.lat+','+s.lng+'&query_place_id='+s.pid):('https://www.google.com/maps/search/'+encodeURIComponent(s.n+' '+s.city));}
function wz(s){return s.lat?('https://waze.com/ul?ll='+s.lat+','+s.lng+'&navigate=yes'):'#';}
function card(s){
 const wa=s.wa?`<a class="a-wa" href="https://wa.me/${s.wa}" target="_blank">💬 WA</a>`:`<a class="a-off">WA待查</a>`;
 const tel=s.tel?`<a class="a-tel" href="tel:+${s.tel}">☎ 電話</a>`:'';
 const wz_=s.lat?`<a class="a-wz" href="${wz(s)}" target="_blank">🧭 Waze</a>`:`<a class="a-off">Waze待查</a>`;
 return `<div class="card" data-t="${s.t}" data-s="${s.star}" style="border-left-color:${TN[s.t].c}">
  <div class="top"><h3>${s.star?'★ ':''}${s.n}<small>${s.city}</small></h3>
   <span class="badge" style="background:${TN[s.t].c}">${TN[s.t].n}</span></div>
  <div class="meta"><div class="addr">⚑ ${s.addr}</div>
   <div>☎ ${s.tel?s.telT:'—'}　　WA ${s.waT}</div>
   <div class="note">▸ ${s.note}</div></div>
  <div class="acts">${wa}${tel}<a class="a-gm" href="${gm(s)}" target="_blank">🗺️ GMaps</a>${wz_}</div></div>`;
}
function render(f){
 const arr=f==='all'?S:(f==='star'?S.filter(x=>x.star):S.filter(x=>x.t===f));
 document.getElementById('list').innerHTML=arr.map(card).join('');
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
 b.classList.add('on'); render(b.dataset.f);
});
render('all');
