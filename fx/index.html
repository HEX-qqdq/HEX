<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美金 · 馬幣 · 人民幣 · 港幣 · 印尼盾 · 台幣 即時換算</title>
<style>
  :root{
    --bg:#0f1e3d; --card:#16294d; --line:#2a3f66;
    --accent:#2d5be8; --gold:#e8b54d; --txt:#eef3fb; --sub:#9fb2d6;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(160deg,#0a1530,#13254a); color:var(--txt);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:24px 16px;
  }
  .wrap{width:100%; max-width:460px}
  h1{font-size:20px; margin:0 0 4px; letter-spacing:1px}
  .sub{color:var(--sub); font-size:13px; margin-bottom:20px; line-height:1.6}
  .row{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:12px; transition:border-color .2s;
  }
  .row:focus-within{border-color:var(--accent)}
  .row label{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--sub); margin-bottom:6px}
  .flag{font-size:18px}
  .row input{
    width:100%; background:transparent; border:none; outline:none;
    color:var(--txt); font-size:28px; font-weight:600; letter-spacing:.5px;
  }
  .row input::placeholder{color:#3f567f}
  .code{margin-left:auto; font-size:12px; color:var(--gold); font-weight:600; letter-spacing:1px}
  .meta{
    margin-top:8px; font-size:12px; color:var(--sub); text-align:center; line-height:1.8;
  }
  .meta b{color:var(--gold); font-weight:600}
  .err{color:#ff8a8a}
  .rate-line{font-size:11px; color:#7d92bd; text-align:center; margin-top:14px; line-height:1.7}
  button.refresh{
    display:block; margin:6px auto 0; background:var(--accent); color:#fff; border:none;
    padding:8px 18px; border-radius:20px; font-size:13px; cursor:pointer;
  }
  button.refresh:active{opacity:.8}
</style>
</head>
<body>
<div class="wrap">
  <h1>即時匯率換算</h1>
  <div class="sub">美金 · 馬來幣 · 人民幣 · 港幣 · 印尼盾 · 台幣<br>以台灣銀行當天匯率為準（即期買入／賣出中價；無即期者採現金中價）</div>

  <div class="row">
    <label><span class="flag">🇺🇸</span>美金 USD<span class="code">USD</span></label>
    <input type="text" inputmode="decimal" id="usd" placeholder="0">
  </div>
  <div class="row">
    <label><span class="flag">🇲🇾</span>馬來幣 Ringgit<span class="code">MYR</span></label>
    <input type="text" inputmode="decimal" id="myr" placeholder="0">
  </div>
  <div class="row">
    <label><span class="flag">🇨🇳</span>人民幣 RMB<span class="code">CNY</span></label>
    <input type="text" inputmode="decimal" id="cny" placeholder="0">
  </div>
  <div class="row">
    <label><span class="flag">🇭🇰</span>港幣 HKD<span class="code">HKD</span></label>
    <input type="text" inputmode="decimal" id="hkd" placeholder="0">
  </div>
  <div class="row">
    <label><span class="flag">🇮🇩</span>印尼盾 Rupiah<span class="code">IDR</span></label>
    <input type="text" inputmode="decimal" id="idr" placeholder="0">
  </div>
  <div class="row">
    <label><span class="flag">🇹🇼</span>新台幣 TWD<span class="code">TWD</span></label>
    <input type="text" inputmode="decimal" id="twd" placeholder="0">
  </div>

  <div class="meta" id="meta">匯率載入中…</div>
  <button class="refresh" id="refreshBtn">重新整理匯率</button>
  <div class="rate-line">
    資料來源：臺灣銀行牌告匯率（即期中價；無即期者採現金中價）<br>
    匯率僅供參考，實際成交以銀行櫃檯為準
  </div>
</div>

<script>
// 後備匯率（抓取失敗時使用）— TWD per 1 unit
// 依 2026/07/11 台銀牌價：USD/CNY/HKD 即期中價；MYR/IDR 台銀無即期，用現金中價
const FALLBACK = { USD: 32.15, MYR: 7.6365, CNY: 4.742, HKD: 4.101, IDR: 0.00173, UPDATED: "後備值 2026/07" };

let rateUSD = FALLBACK.USD; // 1 USD = ? TWD
let rateMYR = FALLBACK.MYR; // 1 MYR = ? TWD
let rateCNY = FALLBACK.CNY; // 1 CNY = ? TWD
let rateHKD = FALLBACK.HKD; // 1 HKD = ? TWD
let rateIDR = FALLBACK.IDR; // 1 IDR = ? TWD
// 各幣別匯率類型（即期/現金），後備時 MYR/IDR 為現金、其餘即期
let rateType = { USD:'即期', MYR:'現金', CNY:'即期', HKD:'即期', IDR:'現金' };
let lastUpdate = FALLBACK.UPDATED;
let usingFallback = true;

const $ = id => document.getElementById(id);
const usdEl = $('usd'), myrEl = $('myr'), cnyEl = $('cny'), hkdEl = $('hkd'), idrEl = $('idr'), twdEl = $('twd'), metaEl = $('meta');

// 從台灣銀行即期匯率 CSV 抓取
async function fetchRates(){
  const url = "https://rate.bot.com.tw/xrt/flcsv/0/day";
  // 透過 CORS proxy（台銀 CSV 不帶 CORS header）
  const proxies = [
    u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
    u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
    u => u
  ];
  for(const make of proxies){
    try{
      const res = await fetch(make(url), {cache:"no-store"});
      if(!res.ok) continue;
      const text = await res.text();
      const parsed = parseBOT(text);
      if(parsed.USD && parsed.MYR && parsed.CNY && parsed.HKD && parsed.IDR){
        rateUSD = parsed.USD.rate; rateMYR = parsed.MYR.rate; rateCNY = parsed.CNY.rate;
        rateHKD = parsed.HKD.rate; rateIDR = parsed.IDR.rate;
        rateType = {
          USD: parsed.USD.type, MYR: parsed.MYR.type, CNY: parsed.CNY.type,
          HKD: parsed.HKD.type, IDR: parsed.IDR.type
        };
        lastUpdate = parsed.date || new Date().toLocaleString("zh-TW");
        usingFallback = false;
        return true;
      }
    }catch(e){ /* try next */ }
  }
  return false;
}

// 解析台銀 CSV：取即期買入(col idx 12)與即期賣出(col idx 13)中價
function parseBOT(csv){
  const lines = csv.trim().split(/\r?\n/);
  const out = {};
  const want = ['USD','MYR','CNY','HKD','IDR'];
  // 台銀 CSV 欄位（每列22欄）：
  // 0=幣別 1=本行買入 2=現金買入 3=即期買入 …
  // 11=本行賣出 12=現金賣出 13=即期賣出
  for(const line of lines){
    const c = line.split(',');
    const code = (c[0]||'').trim();
    if(!want.includes(code)) continue;
    const spotBuy  = parseFloat(c[3]);
    const spotSell = parseFloat(c[13]);
    const cashBuy  = parseFloat(c[2]);
    const cashSell = parseFloat(c[12]);
    // 即期優先；台銀對部分幣別（如 MYR、IDR）無即期，退回現金匯率
    if(spotBuy>0 && spotSell>0){
      out[code] = { rate:(spotBuy+spotSell)/2, type:'即期' };
    } else if(cashBuy>0 && cashSell>0){
      out[code] = { rate:(cashBuy+cashSell)/2, type:'現金' };
    }
  }
  out.date = new Date().toLocaleString("zh-TW",{hour12:false});
  return out;
}

function fmt(n){
  if(!isFinite(n)) return '';
  return n.toLocaleString("en-US",{maximumFractionDigits:2});
}

function fmtIDR(n){
  if(!isFinite(n)) return '';
  return n.toLocaleString("en-US",{maximumFractionDigits:0});
}

function clearOthers(except){
  ['usd','myr','cny','hkd','idr','twd'].forEach(id=>{ if(id!==except) $(id).value=''; });
}

// 以 TWD 為中介換算
function recalc(src){
  const raw = $(src).value.replace(/,/g,'');
  if(raw === '' || isNaN(parseFloat(raw))){ clearOthers(src); return; }
  const v = parseFloat(raw);
  let twd;
  if(src==='usd') twd = v * rateUSD;
  else if(src==='myr') twd = v * rateMYR;
  else if(src==='cny') twd = v * rateCNY;
  else if(src==='hkd') twd = v * rateHKD;
  else if(src==='idr') twd = v * rateIDR;
  else twd = v;

  if(src!=='twd') twdEl.value = fmt(twd);
  if(src!=='usd') usdEl.value = fmt(twd / rateUSD);
  if(src!=='myr') myrEl.value = fmt(twd / rateMYR);
  if(src!=='cny') cnyEl.value = fmt(twd / rateCNY);
  if(src!=='hkd') hkdEl.value = fmt(twd / rateHKD);
  if(src!=='idr') idrEl.value = fmtIDR(twd / rateIDR);
}

usdEl.addEventListener('input', ()=>recalc('usd'));
myrEl.addEventListener('input', ()=>recalc('myr'));
cnyEl.addEventListener('input', ()=>recalc('cny'));
hkdEl.addEventListener('input', ()=>recalc('hkd'));
idrEl.addEventListener('input', ()=>recalc('idr'));
twdEl.addEventListener('input', ()=>recalc('twd'));

function renderMeta(){
  const tag = usingFallback ? '<span class="err">（即時抓取失敗，使用後備匯率）</span>' : '';
  // 標示哪些幣別用現金匯率（台銀無即期報價者）
  const cashList = ['USD','MYR','CNY','HKD','IDR'].filter(k=>rateType[k]==='現金');
  const cashNote = cashList.length
    ? `<br><span style="color:#e8b54d">※ ${cashList.join('、')} 台銀無即期報價，採現金匯率中價</span>`
    : '';
  metaEl.innerHTML =
    `1 USD ≈ <b>${rateUSD.toFixed(3)}</b> TWD　|　1 MYR ≈ <b>${rateMYR.toFixed(3)}</b> TWD<br>`+
    `1 CNY ≈ <b>${rateCNY.toFixed(3)}</b> TWD　|　1 HKD ≈ <b>${rateHKD.toFixed(3)}</b> TWD<br>`+
    `1 TWD ≈ <b>${(1/rateIDR).toFixed(0)}</b> IDR　|　1 MYR ≈ <b>${(rateMYR/rateCNY).toFixed(3)}</b> CNY<br>`+
    `更新時間：${lastUpdate} ${tag}${cashNote}`;
}

async function load(){
  metaEl.textContent = '匯率載入中…';
  await fetchRates();
  renderMeta();
  // 若已有輸入值，重算
  ['usd','myr','cny','hkd','idr','twd'].forEach(id=>{ if($(id).value){ recalc(id); } });
}

$('refreshBtn').addEventListener('click', load);
load();
</script>
</body>
</html>
